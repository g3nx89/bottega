name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Import code-signing certificate
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o /tmp/DevIDG2.cer
          curl -sL https://www.apple.com/appleca/AppleIncRootCertificate.cer -o /tmp/AppleRoot.cer
          security import /tmp/DevIDG2.cer -k "$KEYCHAIN_PATH"
          security import /tmp/AppleRoot.cer -k "$KEYCHAIN_PATH"

          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm /tmp/cert.p12 /tmp/DevIDG2.cer /tmp/AppleRoot.cer

      - name: Package unsigned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac -c.mac.notarize=false --publish never

      - name: Sign app manually
        run: |
          APP="dist/mac-arm64/Bottega.app"
          IDENTITY="Developer ID Application: Alessandro Fato (NMPQ3SH37Y)"
          ENTITLEMENTS="build/entitlements.mac.plist"

          echo "=== Signing all binaries inside $APP ==="

          # Sign nested frameworks and helpers first (inside-out)
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) -not -path "*/MacOS/Bottega" | sort | while read -r file; do
            # Skip non-Mach-O files
            file_type=$(file -b "$file")
            if echo "$file_type" | grep -q "Mach-O"; then
              echo "Signing: $file"
              timeout 60 codesign --sign "$IDENTITY" --force --timestamp \
                --entitlements "$ENTITLEMENTS" --options runtime "$file" 2>&1 || {
                echo "::warning::Failed to sign $file, trying without timestamp..."
                timeout 60 codesign --sign "$IDENTITY" --force \
                  --entitlements "$ENTITLEMENTS" --options runtime "$file" 2>&1
              }
            fi
          done

          # Sign .framework bundles
          find "$APP" -name "*.framework" -type d | sort | while read -r fw; do
            echo "Signing framework: $fw"
            timeout 60 codesign --sign "$IDENTITY" --force --timestamp \
              --entitlements "$ENTITLEMENTS" --options runtime "$fw" 2>&1 || {
              echo "::warning::Failed to sign framework $fw"
            }
          done

          # Sign the main app bundle
          echo "Signing main app: $APP"
          timeout 120 codesign --sign "$IDENTITY" --force --timestamp \
            --entitlements "$ENTITLEMENTS" --options runtime "$APP" 2>&1

          echo "=== Verifying signature ==="
          codesign --verify --deep --strict --verbose=2 "$APP" 2>&1

          echo "=== Done ==="

      - name: Create dmg and zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          # Re-run electron-builder just for dmg/zip creation (app already signed)
          npx electron-builder --mac -c.mac.notarize=false -c.mac.identity=null --publish always

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ZIP=$(ls dist/Bottega-*-arm64-mac.zip)
          echo "Submitting $ZIP for notarization..."
          xcrun notarytool submit "$ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m 2>&1 || echo "::warning::Notarization failed or timed out"
