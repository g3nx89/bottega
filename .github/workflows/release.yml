name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Import code-signing certificate
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o /tmp/DevIDG2.cer
          curl -sL https://www.apple.com/appleca/AppleIncRootCertificate.cer -o /tmp/AppleRoot.cer
          security import /tmp/DevIDG2.cer -k "$KEYCHAIN_PATH"
          security import /tmp/AppleRoot.cer -k "$KEYCHAIN_PATH"

          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm /tmp/cert.p12 /tmp/DevIDG2.cer /tmp/AppleRoot.cer

      - name: Install coreutils
        run: brew install coreutils

      - name: Package unsigned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac -c.mac.notarize=false --publish never

      - name: Sign app
        run: |
          APP="dist/mac-arm64/Bottega.app"
          IDENTITY="Developer ID Application: Alessandro Fato (NMPQ3SH37Y)"
          ENTITLEMENTS="build/entitlements.mac.plist"

          echo "=== Signing all binaries inside $APP ==="

          # Sign ALL native binaries (inside-out): .dylib, .so, .node, and executables
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.node" -o -perm +111 \) -not -path "*/MacOS/Bottega" | sort | while read -r file; do
            file_type=$(file -b "$file")
            if echo "$file_type" | grep -q "Mach-O"; then
              echo "Signing: $file"
              gtimeout 120 codesign --sign "$IDENTITY" --force --timestamp \
                --entitlements "$ENTITLEMENTS" --options runtime "$file" 2>&1
            fi
          done

          # Sign .framework bundles
          find "$APP" -name "*.framework" -type d | sort | while read -r fw; do
            echo "Signing framework: $fw"
            gtimeout 120 codesign --sign "$IDENTITY" --force --timestamp \
              --entitlements "$ENTITLEMENTS" --options runtime "$fw" 2>&1
          done

          # Sign helper apps
          find "$APP/Contents/Frameworks" -name "*.app" -type d | sort | while read -r helper; do
            echo "Signing helper: $helper"
            gtimeout 120 codesign --sign "$IDENTITY" --force --timestamp \
              --entitlements "$ENTITLEMENTS" --options runtime "$helper" 2>&1
          done

          # Sign the main app bundle
          echo "Signing main app: $APP"
          gtimeout 180 codesign --sign "$IDENTITY" --force --timestamp \
            --entitlements "$ENTITLEMENTS" --options runtime "$APP" 2>&1

          echo "=== Verifying signature ==="
          codesign --verify --deep --strict --verbose=2 "$APP" 2>&1
          echo "=== Signing complete ==="

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="dist/mac-arm64/Bottega.app"

          # Create temp zip for notarization submission
          ditto -c -k --keepParent "$APP" /tmp/notarize.zip

          echo "Submitting for notarization..."
          RESULT=$(xcrun notarytool submit /tmp/notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m 2>&1) || true
          echo "$RESULT"

          # Extract submission ID and check status
          SUB_ID=$(echo "$RESULT" | grep "id:" | head -1 | awk '{print $2}')
          if echo "$RESULT" | grep -q "status: Invalid"; then
            echo "::error::Notarization rejected. Fetching log..."
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>&1
            exit 1
          fi

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

          rm /tmp/notarize.zip

      - name: Package stapled app
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Create zip from stapled app (for auto-update)
          cd dist/mac-arm64
          zip -ry "../Bottega-${VERSION}-arm64-mac.zip" Bottega.app
          cd ../..

          # Create dmg with Applications shortcut (drag-to-install)
          DMG_NAME="Bottega-${VERSION}-arm64.dmg"
          DMG_STAGING="/tmp/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R dist/mac-arm64/Bottega.app "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create -volname "Bottega" -srcfolder "$DMG_STAGING" \
            -ov -format UDZO "dist/${DMG_NAME}"
          rm -rf "$DMG_STAGING"

          echo "=== Artifacts ==="
          ls -la dist/*.dmg dist/*.zip

      - name: Generate latest-mac.yml
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ZIP="Bottega-${VERSION}-arm64-mac.zip"
          ZIP_PATH="dist/${ZIP}"
          SHA512=$(shasum -a 512 "$ZIP_PATH" | awk '{print $1}' | xxd -r -p | base64)
          SIZE=$(stat -f%z "$ZIP_PATH")
          cat > dist/latest-mac.yml <<EOYML
          version: ${VERSION}
          files:
            - url: ${ZIP}
              sha512: ${SHA512}
              size: ${SIZE}
          path: ${ZIP}
          sha512: ${SHA512}
          releaseDate: $(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          EOYML
          # Remove leading spaces from heredoc
          sed -i '' 's/^          //' dist/latest-mac.yml
          echo "=== latest-mac.yml ==="
          cat dist/latest-mac.yml

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Generate clean release notes from commit messages
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "$PREV_TAG".."$TAG" --pretty=format:"- %s" \
              | grep -v "^- chore:" \
              | grep -v "Co-Authored-By" \
              | head -20)
          else
            NOTES="Initial release"
          fi
          gh release create "$TAG" --draft --title "Bottega ${TAG#v}" \
            --notes "$NOTES" \
            dist/Bottega-*-arm64.dmg \
            dist/Bottega-*-arm64-mac.zip \
            dist/latest-mac.yml
