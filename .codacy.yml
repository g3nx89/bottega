---
# Codacy configuration for Bottega (Electron + TypeScript + Vanilla JS)
# Docs: https://docs.codacy.com/repositories-configure/codacy-configuration-file/

engines:

  # --- Linting ---

  # ESLint 9 (flat config) — reads eslint.config.js with type-aware rules
  eslint-9:
    enabled: true

  # ESLint 8 (legacy) — DISABLED: uses default patterns, generates false positives
  eslint:
    enabled: false

  # Stylelint — CSS linting (project uses plain CSS, not SCSS)
  stylelint:
    enabled: true

  # ShellCheck — shell script linting
  shellcheck:
    enabled: true

  # markdownlint — markdown docs
  markdownlint:
    enabled: true

  # --- Complexity ---

  # Lizard — cyclomatic complexity and function length
  # Known false positives (Lizard mis-parses TypeScript function boundaries):
  #   - project-tree.ts: rgbaToHex CC=15 (actual CC≈1, 6-line function in color-utils.ts)
  #   - project-tree.ts: resolveLayout CC=12 (actual CC≈4, 12-line function)
  #   - project-tree.ts: projectTextProps CC=11 (actual CC≈3, 9-line function)
  #   - design-system-cache.ts: compactVariable CC=10 (actual CC≈3, merges isColorValue CC)
  #   - design-system-cache.ts: compactComponent CC=10 (actual CC≈4, 20-line function)
  #   - prompt-suggester.ts: parseSuggestions 91 LoC (actual: 13 lines, boundary error)
  lizard:
    enabled: true

  # --- Security ---

  # Trivy — vulnerability scanning (dependencies + IaC)
  trivy:
    enabled: true

  # Opengrep (Semgrep) — SAST patterns
  opengrep:
    enabled: true

  # Checkov — IaC security (CI YAML, Dockerfile)
  checkov:
    enabled: true

  # --- Disabled: not relevant for this stack ---

  # PMD — Java only
  pmd:
    enabled: false

  # Jackson Linter — Java JSON serialization
  jackson:
    enabled: false

  # Deprecated tools
  jshint:
    enabled: false
  csslint:
    enabled: false
  tslint:
    enabled: false
  eslint-deprecated:
    enabled: false

exclude_paths:
  # Test files — complexity metrics on tests are noise
  - "tests/**"
  # Documentation — markdown lint false positives (duplicate headings etc.)
  - "docs/**"
  # Custom semgrep rules (Opengrep flags false duplicate-id)
  - ".semgrep/**"
  # Build output
  - "dist/**"
  # Forked upstream code — not our responsibility
  - "figma-desktop-bridge/**"
  - "src/figma/**"
  # Generated/utility scripts
  - "scripts/**"
  # Test artifacts
  - "test-results/**"
  # Package lock (noise in duplication/complexity)
  - "package-lock.json"
  # Node modules (should already be excluded)
  - "node_modules/**"
