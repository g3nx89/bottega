<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Bottega</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="titlebar">
      <div class="traffic-light-offset"></div>
      <span id="app-title">Bottega</span>
      <span id="app-version" class="app-version"></span>
      <div class="status-area">
        <button id="pin-btn" class="pin-btn" title="Keep on top">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10.5 1.5L14.5 5.5L11 9L12 13L8 9L4 13L5 9L1.5 5.5L5.5 1.5L8 5L10.5 1.5Z" fill="currentColor"/>
          </svg>
        </button>
        <button id="settings-btn" class="settings-btn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.5 1L6 3L4.5 3.5L3 2L1.5 3.5L3 5L2.5 6.5L0.5 7V9L2.5 9.5L3 11L1.5 12.5L3 14L5 12.5L6.5 13L7 15H9L9.5 13L11 12.5L12.5 14L14 12.5L12.5 11L13 9.5L15 9V7L13 6.5L12.5 5L14 3.5L12.5 2L11 3.5L9.5 3L9 1H7L6.5 1ZM8 5.5C9.38 5.5 10.5 6.62 10.5 8S9.38 10.5 8 10.5S5.5 9.38 5.5 8S6.62 5.5 8 5.5Z" fill="currentColor"/>
          </svg>
        </button>
        <span id="status-dot" class="status-dot disconnected"></span>
        <span id="status-text" class="status-text">Disconnected</span>
      </div>
    </header>

    <main id="chat-area"></main>

    <div id="suggestions" class="suggestions hidden"></div>

    <div id="slash-help" class="slash-help hidden"></div>

    <footer id="input-area">
      <div id="slash-menu" class="slash-menu hidden"></div>
      <div id="context-bar" class="context-bar">
        <div class="context-fill" id="context-fill"></div>
        <span class="context-label" id="context-label">0%</span>
      </div>
      <div class="input-wrapper">
        <div id="paste-preview" class="paste-preview hidden"></div>
        <textarea
          id="input-field"
          placeholder="Type / for image commands, or describe what you want…"
          rows="1"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="send-btn" title="Send (Enter)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 8L2 2L5 8L2 14L14 8Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="input-toolbar">
        <div class="toolbar-left">
          <button id="bar-model-btn" class="toolbar-chip" title="Switch model">
            <span id="bar-model-label">Sonnet 4.6</span>
            <svg width="8" height="5" viewBox="0 0 8 5" fill="none"><path d="M1 1L4 4L7 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
          <button id="bar-effort-btn" class="toolbar-chip" title="Thinking effort">
            <span id="bar-effort-label">Medium</span>
            <svg width="8" height="5" viewBox="0 0 8 5" fill="none"><path d="M1 1L4 4L7 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
        </div>
        <span class="input-hint">Enter to send</span>
      </div>
    </footer>

    <div id="settings-overlay" class="settings-overlay hidden">
      <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
          <span class="settings-title">Settings</span>
          <button id="settings-close" class="settings-close" title="Close">&times;</button>
        </div>
        <div class="settings-body">
          <div class="setting-group">
            <label class="setting-label">Accounts</label>
            <div id="accounts-list" class="accounts-list"></div>
            <button id="toggle-apikey-btn" class="setting-link">Use API key instead</button>
            <div id="apikey-section" class="apikey-section hidden">
              <select id="apikey-provider-select" class="setting-select">
                <option value="anthropic">Anthropic</option>
                <option value="openai">OpenAI</option>
                <option value="google">Google</option>
              </select>
              <div class="key-input-row">
                <input type="password" id="api-key-input" class="setting-input" placeholder="sk-..." autocomplete="off">
                <button id="save-key-btn" class="setting-btn-sm">Save</button>
              </div>
              <span id="key-status" class="key-status"></span>
            </div>
          </div>
          <div class="setting-divider"></div>
          <div class="setting-group">
            <label class="setting-label">Model</label>
            <select id="model-select" class="setting-select"></select>
          </div>
          <div class="setting-divider"></div>
          <div class="setting-group">
            <label class="setting-label">Image Generation</label>
            <span class="setting-hint">Powered by Google Nano Banana. A default key is included — or use your own <a href="https://aistudio.google.com/apikey" class="setting-link-inline" target="_blank">Gemini API key</a>.</span>
            <div class="key-input-row">
              <input type="password" id="imagegen-key-input" class="setting-input" placeholder="AIza..." autocomplete="off">
              <button id="imagegen-save-key-btn" class="setting-btn-sm">Save</button>
              <button id="imagegen-reset-key-btn" class="setting-btn-sm hidden">Reset</button>
            </div>
            <span id="imagegen-key-status" class="key-status"></span>
            <label class="setting-sublabel" for="imagegen-model-select">Model</label>
            <select id="imagegen-model-select" class="setting-select"></select>
          </div>
          <div class="setting-divider"></div>
          <div class="setting-group">
            <label class="setting-label" for="transparency-slider">Background transparency</label>
            <div class="slider-row">
              <input type="range" id="transparency-slider" min="0" max="100" value="50" class="setting-slider">
              <span id="transparency-value" class="slider-value">50%</span>
            </div>
          </div>
          <div class="setting-divider"></div>
          <div class="setting-group">
            <label class="setting-label" for="compression-profile-select">Compression profile</label>
            <select id="compression-profile-select" class="setting-select">
              <option value="balanced">Balanced</option>
              <option value="creative">Creative</option>
              <option value="exploration">Exploration</option>
              <option value="minimal">Minimal</option>
            </select>
            <p id="compression-profile-desc" class="setting-description"></p>
            <button id="compression-refresh-btn" class="setting-btn-small" title="Invalidate all compression caches">Refresh caches</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
